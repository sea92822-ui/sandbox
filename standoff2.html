<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standoff 2 - Web Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Segoe UI',Arial,sans-serif;user-select:none}
canvas{display:block}

#menu{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(135deg,#0f0c29 0%,#302b63 50%,#24243e 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;
}
#menu h1{
  font-size:64px;font-weight:900;letter-spacing:4px;text-transform:uppercase;margin-bottom:8px;
  background:linear-gradient(45deg,#f093fb,#f5576c,#4facfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
#menu .subtitle{color:#888;font-size:14px;letter-spacing:8px;text-transform:uppercase;margin-bottom:40px}
.m-btn{
  display:block;width:340px;padding:16px;margin:8px;border:2px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.04);color:#fff;font-size:17px;font-weight:600;cursor:pointer;
  border-radius:10px;transition:all 0.3s;text-align:center;letter-spacing:1px;backdrop-filter:blur(8px);
}
.m-btn:hover{background:rgba(255,255,255,0.12);border-color:#4facfe;transform:translateY(-2px);box-shadow:0 8px 30px rgba(79,172,254,0.25)}
.m-btn.s{font-size:14px;border-color:rgba(255,255,255,0.06)}
.m-btn.s:hover{border-color:#f5576c;box-shadow:0 8px 30px rgba(245,87,108,0.25)}
#jc{width:340px;padding:14px;margin:8px;background:rgba(255,255,255,0.04);border:2px solid rgba(255,255,255,0.12);color:#fff;font-size:20px;text-align:center;border-radius:10px;outline:none;letter-spacing:6px;text-transform:uppercase;transition:all 0.3s}
#jc:focus{border-color:#4facfe;box-shadow:0 0 25px rgba(79,172,254,0.25)}
#jc::placeholder{color:#444;letter-spacing:1px;font-size:14px}

#hud{position:fixed;inset:0;pointer-events:none;z-index:10;display:none}
#ch{
  position:absolute;top:50%;left:50%;width:28px;height:28px;transform:translate(-50%,-50%);
}
#ch::before,#ch::after{content:'';position:absolute;background:rgba(255,255,255,0.85)}
#ch::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
#ch::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
#cd{position:absolute;top:50%;left:50%;width:4px;height:4px;transform:translate(-50%,-50%);background:#ff4444;border-radius:50%}

#hb{position:absolute;bottom:70px;left:30px;display:flex;flex-direction:column;gap:3px}
.bl{color:#999;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.bb{width:200px;height:5px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.bf{height:100%;border-radius:3px;transition:width 0.3s}
#hf{background:linear-gradient(90deg,#ff4444,#ff6b6b)}
#af{background:linear-gradient(90deg,#4488ff,#6bb5ff)}

#aw{position:absolute;bottom:70px;right:30px;text-align:right}
#ac{font-size:52px;font-weight:700;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,0.6)}
#ar{font-size:16px;color:#888}
#wn{font-size:12px;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-top:2px}

#kf{position:absolute;top:70px;right:20px;display:flex;flex-direction:column;gap:4px;max-width:320px}
.km{
  background:rgba(0,0,0,0.75);padding:6px 14px;border-radius:6px;font-size:13px;color:#fff;
  animation:ff 3s forwards;text-align:right;backdrop-filter:blur(4px);
  border-left:3px solid rgba(255,255,255,0.1);
}
.km .kl{color:#ff6b6b;font-weight:700}
.km .kv{color:#ccc}
.km .kw{color:#ffd93d;font-size:11px}
@keyframes ff{0%{opacity:1;transform:translateX(0)}70%{opacity:1}100%{opacity:0;transform:translateX(60px)}}

#sc{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:40px}
.si{text-align:center}
.si .l{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1px}
.si .v{font-size:22px;font-weight:700;color:#fff}
.si .v.en{color:#ff6b6b}

#do{position:fixed;inset:0;pointer-events:none;border:10px solid transparent;transition:border-color 0.08s;border-radius:0}

#cs{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);color:#888;font-size:13px;z-index:10;display:none;background:rgba(0,0,0,0.75);padding:8px 20px;border-radius:20px;backdrop-filter:blur(4px)}
#cs.ok{color:#4caf50}
#cs.err{color:#ff4444}

#rb{position:absolute;bottom:55px;left:50%;transform:translateX(-50%);width:160px;height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;display:none}
#rbf{height:100%;background:linear-gradient(90deg,#ffd93d,#ffb800);border-radius:2px;transition:width 0.05s linear}

#wp{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);display:flex;gap:12px}
.wi{width:60px;height:60px;border:2px solid rgba(255,255,255,0.1);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#666;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.2s;background:rgba(0,0,0,0.3)}
.wi.active{border-color:#4facfe;color:#fff;background:rgba(79,172,254,0.15);box-shadow:0 0 20px rgba(79,172,254,0.2)}
.wi .w-icon{font-size:20px;margin-bottom:2px}

@media(max-width:600px){
  #menu h1{font-size:36px}
  .m-btn{width:280px}
  #jc{width:280px}
  #hb{left:15px}
  #aw{right:15px}
  #ac{font-size:36px}
}
</style>
</head>
<body>

<div id="menu">
  <h1>STANDOFF 2</h1>
  <div class="subtitle">WEB EDITION</div>
  <button class="m-btn" onclick="startSP()">🎯 Одиночная игра</button>
  <button class="m-btn" onclick="showCR()">🌐 Создать комнату</button>
  <button class="m-btn" onclick="showJR()">🔗 Присоединиться по коду</button>
  <div id="js" style="display:none;flex-direction:column;align-items:center;margin-top:15px">
    <input id="jc" type="text" maxlength="6" placeholder="КОД КОМНАТЫ">
    <div style="display:flex;gap:8px">
      <button class="m-btn" style="width:auto;padding:12px 30px" onclick="joinR()">Войти</button>
      <button class="m-btn s" style="width:auto;padding:12px 30px" onclick="hideJ()">Назад</button>
    </div>
  </div>
  <div id="csect" style="display:none;flex-direction:column;align-items:center;margin-top:15px">
    <div style="color:#888;font-size:13px;letter-spacing:2px;margin-bottom:5px">КОД КОМНАТЫ</div>
    <div id="rcd" style="font-size:52px;font-weight:900;letter-spacing:16px;color:#4facfe;text-shadow:0 0 50px rgba(79,172,254,0.4)"></div>
    <div style="color:#888;font-size:13px;margin:15px 0">Ожидание подключения друга...</div>
    <button class="m-btn s" onclick="cancelC()">Отмена</button>
  </div>
</div>

<div id="hud">
  <div id="ch"><div id="cd"></div></div>
  <div id="hb">
    <div class="bl">❤️ Здоровье</div>
    <div class="bb"><div id="hf" class="bf" style="width:100%"></div></div>
    <div class="bl" style="margin-top:4px">🛡️ Броня</div>
    <div class="bb"><div id="af" class="bf" style="width:0%"></div></div>
  </div>
  <div id="aw">
    <div id="wn">PISTOL</div>
    <div id="ac">12</div>
    <div id="ar">/ 36</div>
  </div>
  <div id="sc">
    <div class="si"><div class="l">Фраги</div><div class="v" id="ms">0</div></div>
    <div class="si"><div class="l">Смерти</div><div class="v en" id="es">0</div></div>
  </div>
  <div id="kf"></div>
  <div id="do"></div>
  <div id="rb"><div id="rbf"></div></div>
  <div id="wp">
    <div class="wi active" id="w0"><span class="w-icon">🔫</span>1</div>
    <div class="wi" id="w1"><span class="w-icon">⚔️</span>2</div>
  </div>
</div>

<div id="cs"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ======================== CONFIG ========================
const CFG = {
  walkSpeed: 7, runSpeed: 13, jumpForce: 8, gravity: -28,
  mouseSens: 0.002, botCount: 4, mapSize: 55, wallH: 3.5
};

// ======================== SOUND ========================
const SND = {
  ctx: null, init(){
    if(this.ctx) return; this.ctx = new (window.AudioContext||webkitAudioContext)();
  },
  _n(d,f,t,v,fl){
    if(!this.ctx) return;
    const o=this.ctx.createOscillator(), g=this.ctx.createGain();
    if(fl){const f2=this.ctx.createBiquadFilter();f2.type='lowpass';f2.frequency.value=fl;o.connect(f2);f2.connect(g)}
    else o.connect(g);
    g.connect(this.ctx.destination);o.type=t;o.frequency.value=f;
    g.gain.setValueAtTime(v,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,this.ctx.currentTime+d);
    o.start();o.stop(this.ctx.currentTime+d);
  },
  shoot(r){this.init();this._n(0.15,r?150:200,r?'sawtooth':'square',0.15,r?2000:3000);this._n(0.1,r?80:60,r?'square':'sawtooth',0.08,r?500:300)},
  hit(){this.init();this._n(0.08,300,'sine',0.1,1000)},
  reload(){this.init();if(!this.ctx)return;const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);o.type='sawtooth';o.frequency.setValueAtTime(700,t);o.frequency.linearRampToValueAtTime(200,t+0.4);g.gain.setValueAtTime(0.08,t);g.gain.linearRampToValueAtTime(0.001,t+0.5);o.start(t);o.stop(t+0.5)},
  death(){this.init();this._n(0.5,80,'sawtooth',0.2,200);this._n(0.3,50,'sine',0.15,100)},
  pickup(){this.init();if(!this.ctx)return;const t=this.ctx.currentTime,o=this.ctx.createOscillator(),g=this.ctx.createGain();o.connect(g);g.connect(this.ctx.destination);o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.linearRampToValueAtTime(800,t+0.15);g.gain.setValueAtTime(0.1,t);g.gain.linearRampToValueAtTime(0.001,t+0.2);o.start(t);o.stop(t+0.3)}
};

// ======================== GAME STATE ========================
const G = {
  state:'menu', isMP:false, localId:'p_'+Math.random().toString(36).substr(2,6),
  peer:null, conn:null, roomCode:null, netPlayers:{},
  kills:0, deaths:0, _loop:false, _envObjects:[], _sceneInit:false
};

// ======================== THREE.JS ========================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x7ec8e3);
scene.fog = new THREE.Fog(0x7ec8e3, 70, 140);

const cam = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.1, 200);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);

const lr = new CSS2DRenderer();
lr.setSize(innerWidth, innerHeight);
lr.domElement.style.cssText = 'position:fixed;top:0;left:0;pointer-events:none;z-index:5';
document.body.prepend(lr.domElement);

addEventListener('resize',()=>{
  cam.aspect = innerWidth/innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  lr.setSize(innerWidth, innerHeight);
});

// ======================== ENVIRONMENT ========================
function buildEnv(){
  cleanupEnv();

  const gGeo = new THREE.PlaneGeometry(CFG.mapSize*2, CFG.mapSize*2);
  const gMat = new THREE.MeshStandardMaterial({color:0x4a7c4f,roughness:0.9,metalness:0});
  const g = new THREE.Mesh(gGeo, gMat);
  g.rotation.x = -Math.PI/2;
  g.receiveShadow = true;
  scene.add(g);
  G._envObjects.push(g);

  const grid = new THREE.GridHelper(CFG.mapSize*2, 40, 0x3a6c3f, 0x3a6c3f);
  grid.material.transparent = true; grid.material.opacity = 0.15;
  scene.add(grid);
  G._envObjects.push(grid);

  const amb = new THREE.AmbientLight(0x404060, 0.35);
  scene.add(amb); G._envObjects.push(amb);

  const hemi = new THREE.HemisphereLight(0x87CEEB, 0x4a7c4f, 0.8);
  scene.add(hemi); G._envObjects.push(hemi);

  const sun = new THREE.DirectionalLight(0xffeedd, 1.4);
  sun.position.set(40,50,30);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048,2048);
  sun.shadow.camera.near = 0.5; sun.shadow.camera.far = 120;
  sun.shadow.camera.left = -60; sun.shadow.camera.right = 60;
  sun.shadow.camera.top = 60; sun.shadow.camera.bottom = -60;
  scene.add(sun); G._envObjects.push(sun);

  const fill = new THREE.DirectionalLight(0x4488ff, 0.25);
  fill.position.set(-30,20,-30);
  scene.add(fill); G._envObjects.push(fill);

  const wM = new THREE.MeshStandardMaterial({color:0x8a8a8a,roughness:0.7,metalness:0.1});
  const wD = new THREE.MeshStandardMaterial({color:0x5a5a5a,roughness:0.8,metalness:0.05});
  const cM = new THREE.MeshStandardMaterial({color:0x9a9a9a,roughness:0.9,metalness:0});

  const obs = [
    [0,0,0,12,CFG.wallH,12,wM],
    [-18,0,-15,8,CFG.wallH,1.5,wM],[18,0,15,8,CFG.wallH,1.5,wM],
    [-15,0,18,1.5,CFG.wallH,8,wM],[15,0,-18,1.5,CFG.wallH,8,wM],
    [-8,0,-8,2,1.8,2,cM],[8,0,8,2,1.8,2,cM],
    [10,0,-10,3,1.2,3,wD],[-10,0,10,3,1.2,3,wD],
    [-5,0,15,1.5,2.2,1.5,cM],[5,0,-15,1.5,2.2,1.5,cM],
    [-22,0,-5,4,CFG.wallH,1.5,wM],[-22,0,-5,1.5,CFG.wallH,4,wM],
    [22,0,5,4,CFG.wallH,1.5,wM],[22,0,5,1.5,CFG.wallH,4,wM],
    [-28,0,20,6,2.5,2,wD],[28,0,-20,6,2.5,2,wD],
  ];
  obs.forEach(o=>{
    const m = new THREE.Mesh(new THREE.BoxGeometry(o[3],o[4],o[5]), o[6]);
    m.position.set(o[0], o[1]+o[4]/2, o[2]);
    m.castShadow = true; m.receiveShadow = true;
    m.userData.isWall = true;
    scene.add(m); G._envObjects.push(m);
  });

  // Border walls
  const bM = new THREE.MeshStandardMaterial({color:0x3a3a3a,roughness:0.9});
  const h = CFG.wallH, s = CFG.mapSize;
  [[0,0,-s,s*2,h,0.5],[0,0,s,s*2,h,0.5],[-s,0,0,0.5,h,s*2],[s,0,0,0.5,h,s*2]].forEach(b=>{
    const m = new THREE.Mesh(new THREE.BoxGeometry(b[3],b[4],b[5]), bM);
    m.position.set(b[0], b[1]+h/2, b[2]);
    m.userData.isWall = true;
    scene.add(m); G._envObjects.push(m);
  });

  // Barrels
  const baM = new THREE.MeshStandardMaterial({color:0x6b3a2a,roughness:0.8});
  for(let i=0;i<8;i++){
    const m = new THREE.Mesh(new THREE.CylinderGeometry(0.5,0.5,1.2,8), baM);
    const a = (i/8)*Math.PI*2, r = 3.5+Math.random()*2.5;
    m.position.set(Math.cos(a)*r, 0.6, Math.sin(a)*r);
    m.castShadow = true; m.receiveShadow = true;
    m.userData.isWall = true;
    scene.add(m); G._envObjects.push(m);
  }
}

function cleanupEnv(){
  G._envObjects.forEach(o=>scene.remove(o));
  G._envObjects = [];
}

// ======================== PLAYER CLASS ========================
class Player {
  constructor(id, isLocal){
    this.id = id;
    this.isLocal = isLocal;
    this.health = 100;
    this.maxHealth = 100;
    this.armor = isLocal ? 50 : 0;
    this.maxArmor = 100;
    this.kills = 0; this.deaths = 0;
    this.pos = new THREE.Vector3((Math.random()-0.5)*20, 1, (Math.random()-0.5)*20);
    this.vel = new THREE.Vector3();
    this.yaw = 0; this.pitch = 0;
    this.onGround = true;
    this.alive = true;

    this.weapons = [
      {name:'PISTOL', ammo:12, maxAmmo:12, reserve:36, dmg:22, rate:280, rifle:false, reloadTime:1200},
      {name:'RIFLE', ammo:30, maxAmmo:30, reserve:90, dmg:28, rate:100, rifle:true, reloadTime:2000}
    ];
    this.wp = 0;
    this.lastFire = 0;
    this.reloading = false;
    this.reloadStart = 0;
    this.mesh = null;
    this.label = null;
    this._build();
  }

  _build(){
    const g = new THREE.Group();
    const bM = new THREE.MeshStandardMaterial({color:this.isLocal?0x2d7dd2:0xd24a2d,roughness:0.6,metalness:0.2});
    const b = new THREE.Mesh(new THREE.CylinderGeometry(0.4,0.5,0.8,8), bM);
    b.position.y = 0.8; b.castShadow = true; g.add(b);

    const hM = new THREE.MeshStandardMaterial({color:0xf0c8a0,roughness:0.5});
    const h = new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8), hM);
    h.position.y = 1.4; h.castShadow = true; g.add(h);

    const aM = new THREE.MeshStandardMaterial({color:0xf0c8a0,roughness:0.5});
    const aG = new THREE.CylinderGeometry(0.08,0.1,0.5,6);
    const lA = new THREE.Mesh(aG, aM); lA.position.set(-0.4,0.9,0); lA.rotation.z = 0.2; g.add(lA);
    const rA = new THREE.Mesh(aG, aM); rA.position.set(0.4,0.9,0); rA.rotation.z = -0.2; g.add(rA);

    const lM = new THREE.MeshStandardMaterial({color:0x3a3a5a,roughness:0.7});
    const lG = new THREE.CylinderGeometry(0.1,0.12,0.5,6);
    const lL = new THREE.Mesh(lG, lM); lL.position.set(-0.15,0.25,0); g.add(lL);
    const rL = new THREE.Mesh(lG, lM); rL.position.set(0.15,0.25,0); g.add(rL);

    // Weapon prop
    const wM = new THREE.MeshStandardMaterial({color:0x333,metalness:0.5,roughness:0.3});
    const wP = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.04,0.4), wM);
    wP.position.set(0.4,0.9,0.3); g.add(wP);

    this.mesh = g;

    const d = document.createElement('div');
    d.style.cssText = 'color:#fff;font-size:12px;font-weight:600;text-shadow:0 1px 4px rgba(0,0,0,0.8);background:rgba(0,0,0,0.4);padding:2px 10px;border-radius:12px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1)';
    d.textContent = this.isLocal ? 'YOU' : 'ENEMY';
    this.label = new CSS2DObject(d);
    this.label.position.y = 2.3;
    g.add(this.label);
  }

  dmg(amount){
    if(!this.alive) return;
    if(this.armor>0){const a=amount*0.5;this.armor=Math.max(0,this.armor-a);amount-=a*0.7}
    this.health = Math.max(0, this.health - amount);
    if(this.health<=0) this.die();
  }

  die(){
    this.alive = false; this.health = 0; this.deaths++;
    if(this.isLocal) SND.death();
    setTimeout(()=>this.respawn(), 2500);
  }

  respawn(){
    this.alive = true; this.health = this.maxHealth; this.armor = this.isLocal ? 50 : 0;
    const a = Math.random()*Math.PI*2, d = 5+Math.random()*15;
    this.pos.set(Math.cos(a)*d, 1, Math.sin(a)*d);
    this.vel.set(0,0,0);
  }

  update(){
    if(!this.alive && this.mesh) this.mesh.visible = false;
    else if(this.mesh){
      this.mesh.visible = true;
      this.mesh.position.copy(this.pos); this.mesh.position.y = 0;
      this.mesh.rotation.y = this.yaw;
    }
  }
}

// ======================== BOT AI ========================
class Bot extends Player {
  constructor(id){
    super(id, false);
    this.targetPos = new THREE.Vector3();
    this.aiState = 'patrol';
    this.aiTimer = 0;
    this.lastShot = 0;
    this.accuracy = 0.25 + Math.random()*0.4;
    this.aggro = 0.3 + Math.random()*0.5;
    this.strafeDir = Math.random()>0.5?1:-1;
    this.strafeT = 0;
    this.patrolPts = [];
    for(let i=0;i<4;i++) this.patrolPts.push(new THREE.Vector3((Math.random()-0.5)*35,1,(Math.random()-0.5)*35));
    this.ptIdx = Math.floor(Math.random()*this.patrolPts.length);
    this.targetPos.copy(this.patrolPts[this.ptIdx]);

    const a = Math.random()*Math.PI*2, d = 15+Math.random()*15;
    this.pos.set(Math.cos(a)*d, 1, Math.sin(a)*d);

    this.label.element.textContent = 'BOT';
    this.label.element.style.color = '#ff6b6b';
    scene.add(this.mesh);
  }

  tick(dt, target){
    if(!this.alive){
      if(this.mesh) this.mesh.visible = false;
      return;
    }
    this.mesh.visible = true;
    this.aiTimer -= dt; this.strafeT -= dt;
    if(!target||!target.alive){this.aiState='patrol';target=null}

    const dist = target ? this.pos.distanceTo(target.pos) : 999;
    if(target){
      if(dist<40&&this.aiState==='patrol')this.aiState='chase';
      else if(dist<18&&this.aiState==='chase')this.aiState='attack';
      else if(dist>28&&this.aiState==='attack')this.aiState='chase';
      else if(dist>50)this.aiState='patrol';
    }

    const speed = {patrol:2.5, chase:4.5+this.aggro*2, attack:2.5+this.aggro}[this.aiState];

    if(this.aiState==='patrol'){
      const d = new THREE.Vector3().subVectors(this.patrolPts[this.ptIdx], this.pos);
      d.y = 0;
      if(d.length()<2.5){this.ptIdx=(this.ptIdx+1)%this.patrolPts.length}
      else{d.normalize();this.pos.x+=d.x*speed*dt;this.pos.z+=d.z*speed*dt}
    } else if(this.aiState==='chase'&&target){
      const d = new THREE.Vector3().subVectors(target.pos, this.pos);
      d.y = 0; d.normalize();
      this.pos.x += d.x*speed*dt; this.pos.z += d.z*speed*dt;
      this._wallPush();
      if(Math.random()<this.aggro*0.25) this._shoot(target);
    } else if(this.aiState==='attack'&&target){
      const d = new THREE.Vector3().subVectors(target.pos, this.pos);
      d.y = 0; const dist2 = d.length();
      if(this.strafeT<=0){this.strafeDir=Math.random()>0.5?1:-1;this.strafeT=0.8+Math.random()*1.2}
      const s = new THREE.Vector3(-d.z,0,d.x).normalize();
      this.pos.x += s.x*this.strafeDir*speed*dt; this.pos.z += s.z*this.strafeDir*speed*dt;
      if(dist2>12){d.normalize();this.pos.x+=d.x*speed*dt;this.pos.z+=d.z*speed*dt}
      else if(dist2<4){d.normalize();this.pos.x-=d.x*speed*dt;this.pos.z-=d.z*speed*dt}
      this._wallPush();
      this._shoot(target);
    }

    // Look at target
    if(target&&target.alive&&this.pos.distanceTo(target.pos)<60){
      const d = new THREE.Vector3().subVectors(target.pos, this.pos);
      this.yaw = Math.atan2(d.x, d.z);
    }

    super.update();
  }

  _shoot(target){
    const now = performance.now();
    if(now-this.lastShot<600) return;
    if(!target.alive) return;
    this.lastShot = now;
    const dist = this.pos.distanceTo(target.pos);
    if(Math.random()<this.accuracy-dist/120){
      const dmg = 12+Math.random()*12;
      target.dmg(dmg);
      if(target.isLocal){
        document.getElementById('do').style.borderColor = 'rgba(255,0,0,0.35)';
        setTimeout(()=>{document.getElementById('do').style.borderColor='transparent'},100);
        SND.hit(); updHUD();
        if(!target.alive){addKF('BOT','YOU','RIFLE');G.deaths++;updHUD()}
      }
    }
    // Muzzle flash
    if(this.mesh.children[0]&&this.mesh.children[0].material){
      const o=this.mesh.children[0].material.color.getHex();
      this.mesh.children[0].material.color.setHex(0xffff00);
      setTimeout(()=>{if(this.mesh.children[0]&&this.mesh.children[0].material)this.mesh.children[0].material.color.setHex(o)},50);
    }
  }

  _wallPush(){
    const s = CFG.mapSize - 1;
    this.pos.x = Math.max(-s, Math.min(s, this.pos.x));
    this.pos.z = Math.max(-s, Math.min(s, this.pos.z));
    G._envObjects.forEach(o=>{
      if(!o.userData||!o.userData.isWall||!o.geometry) return;
      const b=new THREE.Box3().setFromObject(o), p=this.pos, r=0.45;
      const hw=(b.max.x-b.min.x)/2+r, hd=(b.max.z-b.min.z)/2+r;
      const cx=(b.max.x+b.min.x)/2, cz=(b.max.z+b.min.z)/2;
      const dx=p.x-cx, dz=p.z-cz;
      if(Math.abs(dx)<hw&&Math.abs(dz)<hd){
        const ox=hw-Math.abs(dx), oz=hd-Math.abs(dz);
        if(ox<oz) p.x+=dx>0?ox:-ox; else p.z+=dz>0?oz:-oz;
      }
    });
  }
}

// ======================== WEAPON VIEW ========================
let wpModel = null;
let wpBob = 0;

function makeWp(){
  const g = new THREE.Group();
  const gM = new THREE.MeshStandardMaterial({color:0x222,roughness:0.3,metalness:0.6});
  const b = new THREE.Mesh(new THREE.BoxGeometry(0.07,0.04,0.32), gM);
  b.position.set(0.2,-0.1,-0.3); g.add(b);
  const bM = new THREE.MeshStandardMaterial({color:0x111,metalness:0.8,roughness:0.2});
  const bl = new THREE.Mesh(new THREE.CylinderGeometry(0.015,0.02,0.15,6), bM);
  bl.rotation.x = Math.PI/2; bl.position.set(0.2,-0.1,-0.5); g.add(bl);
  const hM = new THREE.MeshStandardMaterial({color:0x3a2a1a,roughness:0.8});
  const hd = new THREE.Mesh(new THREE.BoxGeometry(0.04,0.08,0.04), hM);
  hd.position.set(0.2,-0.16,-0.25); g.add(hd);
  g.position.set(0.35,-0.22,-0.5);
  cam.add(g);
  wpModel = g;
}

function updWp(dt){
  if(!wpModel) return;
  const p = localP;
  if(!p||!p.alive) return;
  const moving = K.w||K.s||K.a||K.d;
  if(moving&&p.onGround){
    wpBob += dt*12;
    wpModel.position.x = 0.35 + Math.sin(wpBob)*0.004;
    wpModel.position.y = -0.22 + Math.abs(Math.cos(wpBob))*0.006;
  } else {
    wpModel.position.lerp(new THREE.Vector3(0.35,-0.22,-0.5), 0.08);
  }
  if(p.reloading){
    const el = performance.now()-p.reloadStart;
    const pr = Math.min(1, el/p.weapons[p.wp].reloadTime);
    wpModel.position.y = -0.22 - Math.sin(pr*Math.PI*2)*0.06;
    wpModel.rotation.z = Math.sin(pr*Math.PI*2)*0.12;
  } else {
    wpModel.rotation.z *= 0.9;
  }
  const s = p.weapons[p.wp].rifle ? 1.0 : 0.8;
  wpModel.scale.setScalar(s);
}

// ======================== INPUT ========================
const K = {w:false,a:false,s:false,d:false,shift:false,space:false,r:false};
let locked = false;

addEventListener('keydown',e=>{
  const c=e.code;
  if(c==='KeyW')K.w=true; else if(c==='KeyA')K.a=true; else if(c==='KeyS')K.s=true; else if(c==='KeyD')K.d=true;
  else if(c==='ShiftLeft')K.shift=true; else if(c==='Space')K.space=true; else if(c==='KeyR'){K.r=true;doReload()}
  else if(c==='Digit1')swWp(0); else if(c==='Digit2')swWp(1);
});
addEventListener('keyup',e=>{
  const c=e.code;
  if(c==='KeyW')K.w=false; else if(c==='KeyA')K.a=false; else if(c==='KeyS')K.s=false; else if(c==='KeyD')K.d=false;
  else if(c==='ShiftLeft')K.shift=false; else if(c==='Space')K.space=false; else if(c==='KeyR')K.r=false;
});
addEventListener('mousemove',e=>{
  if(!locked||G.state==='menu')return;
  const p=localP; if(!p||!p.alive)return;
  p.yaw-=e.movementX*CFG.mouseSens; p.pitch-=e.movementY*CFG.mouseSens;
  p.pitch=Math.max(-Math.PI/2.2,Math.min(Math.PI/2.2,p.pitch));
});
addEventListener('mousedown',e=>{if(e.button===0&&locked)doShoot()});
addEventListener('pointerlockchange',()=>{locked=!!document.pointerLockElement});

// ======================== LOCAL ========================
let localP = null;
let bots = [];
const ray = new THREE.Raycaster();
const hitP = new THREE.Vector3();

function spawnLocal(){
  localP = new Player(G.localId, true);
  localP.pos.set(0,1,25);
  cam.position.set(0,1.5,25);
  cam.rotation.order = 'YXZ';
  scene.add(localP.mesh);
}

function spawnBots(n){
  for(let i=0;i<n;i++){const b=new Bot('b'+i);bots.push(b);scene.add(b.mesh)}
}

// ======================== SHOOTING ========================
function doShoot(){
  const p=localP; if(!p||!p.alive||p.reloading)return;
  const wp=p.weapons[p.wp]; if(!wp)return;
  const now=performance.now();
  if(now-p.lastFire<wp.rate)return;
  if(wp.ammo<=0){doReload();return}
  p.lastFire=now; wp.ammo--;
  SND.shoot(wp.rifle); updHUD();

  // Network shoot notification
  if(G.isMP) netSend({type:'shoot', id:G.localId});

  ray.setFromCamera({x:0,y:0}, cam);
  let near=null, nearD=Infinity;
  const targets=[...bots];
  if(G.isMP)Object.values(G.netPlayers).forEach(n=>{if(n.p&&n.p.alive)targets.push(n.p)});

  targets.forEach(t=>{
    if(!t.alive||!t.mesh)return;
    const b=new THREE.Box3().setFromObject(t.mesh);
    if(ray.ray.intersectsBox(b)){
      ray.ray.intersectBox(b, hitP);
      const d=ray.ray.origin.distanceTo(hitP);
      if(d<nearD){nearD=d;near=t}
    }
  });

  if(near&&nearD<80){
    const dmg=wp.dmg;
    near.dmg(dmg); SND.hit();
    if(G.isMP){
      netSend({type:'hit', tid:near.id, dmg:dmg, aid:G.localId, w:wp.name});
    }
    if(!near.alive){
      const wn=wp.name;
      if(near instanceof Bot){addKF('YOU','BOT',wn);G.kills++;G.botKills++;updHUD()}
      else if(G.isMP){addKF('YOU',near.label?.element?.textContent||'ENEMY',wn);G.kills++;updHUD()}
    }
  }

  if(wpModel)wpModel.children.forEach(c=>{
    if(c.material&&c.material.color){const o=c.material.color.getHex();c.material.color.setHex(0xffff88);setTimeout(()=>{c.material.color.setHex(o)},30)}
  });

  if(wp.ammo<=0)setTimeout(()=>doReload(),200);
}

function doReload(){
  const p=localP; if(!p||p.reloading||!p.alive)return;
  const wp=p.weapons[p.wp]; if(!wp||wp.ammo===wp.maxAmmo||wp.reserve<=0)return;
  p.reloading=true; p.reloadStart=performance.now();
  SND.reload();
  document.getElementById('rb').style.display='block';
  document.getElementById('rbf').style.width='0%';
  setTimeout(()=>{
    const n=wp.maxAmmo-wp.ammo, a=Math.min(n,wp.reserve);
    wp.ammo+=a; wp.reserve-=a;
    p.reloading=false; document.getElementById('rb').style.display='none';
    updHUD();
  }, wp.reloadTime);
}

function swWp(i){
  const p=localP; if(!p||p.reloading)return;
  if(i<0||i>=p.weapons.length)return;
  p.wp=i; updHUD(); SND.pickup();
  document.querySelectorAll('.wi').forEach((el,idx)=>el.classList.toggle('active',idx===i));
}

// ======================== HUD ========================
function updHUD(){
  const p=localP; if(!p)return;
  const wp=p.weapons[p.wp];
  const hp=(p.health/p.maxHealth)*100, ap=(p.armor/p.maxArmor)*100;
  document.getElementById('hf').style.width=hp+'%';
  document.getElementById('af').style.width=ap+'%';
  const hc=hp>60?'#44ff88':hp>30?'#ffd93d':'#ff4444';
  document.getElementById('hf').style.background=`linear-gradient(90deg,${hc},${hp>60?'#66ffaa':hp>30?'#ffeb6b':'#ff6b6b'})`;
  if(wp){
    document.getElementById('ac').textContent=wp.ammo;
    document.getElementById('ar').textContent='/ '+wp.reserve;
    document.getElementById('wn').textContent=wp.name;
  }
  document.getElementById('ms').textContent=G.kills;
  document.getElementById('es').textContent=G.deaths;
  if(p.reloading&&wp){
    const el=performance.now()-p.reloadStart, pr=Math.min(1,el/wp.reloadTime);
    document.getElementById('rbf').style.width=(pr*100)+'%';
  }
}

function addKF(killer, victim, weapon){
  const f=document.getElementById('kf'), m=document.createElement('div');
  m.className='km';
  m.innerHTML=`<span class="kl">${killer}</span> <span style="color:#555">►</span> <span class="kv">${victim}</span> <span class="kw">${weapon}</span>`;
  f.appendChild(m); setTimeout(()=>m.remove(),3200);
}

// ======================== MENU ========================
function menuShow(v){
  document.getElementById('menu').style.display=v?'flex':'none';
  document.getElementById('hud').style.display=v?'none':'block';
  document.querySelectorAll('.wi').forEach((el,i)=>el.classList.toggle('active',i===0));
  if(v&&document.pointerLockElement)document.exitPointerLock();
}

window.startSP=()=>{
  SND.init(); menuShow(false); G.state='playing'; G.isMP=false;
  initGame(); renderer.domElement.requestPointerLock();
};

window.showCR=()=>{
  document.getElementById('csect').style.display='flex';
  document.getElementById('js').style.display='none';
  const c=Math.random().toString(36).substr(2,6).toUpperCase();
  G.roomCode=c; document.getElementById('rcd').textContent=c;
  initMP('create',c);
};

window.showJR=()=>{document.getElementById('js').style.display='flex';document.getElementById('csect').style.display='none'};
window.hideJ=()=>{document.getElementById('js').style.display='none'};
window.cancelC=()=>{if(G.peer){G.peer.destroy();G.peer=null}document.getElementById('csect').style.display='none'};
window.joinR=()=>{
  const c=document.getElementById('jc').value.trim().toUpperCase();
  if(c.length<3)return; G.roomCode=c; menuShow(false); G.state='multiplayer'; G.isMP=true;
  initGame(); initMP('join',c); renderer.domElement.requestPointerLock();
};

// ======================== MULTIPLAYER ========================
function initMP(mode, code){
  const s = document.createElement('script');
  s.src = 'https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js';
  s.onload = ()=>{
    try{
      const peer = new Peer(G.localId, {debug:0});
      G.peer = peer;
      peer.on('open', id=>{
        connStat('Connected to PeerJS');
        if(mode==='create') peer.on('connection', conn=>setupConn(conn,true));
        else {const conn=peer.connect(code);setupConn(conn,false)}
      });
      peer.on('error', e=>{console.error(e);connStat('Connection error',true)});
    } catch(e){console.error(e);connStat('Failed to init',true)}
  };
  document.head.appendChild(s);
}

function setupConn(conn, isHost){
  G.conn = conn;
  conn.on('open', ()=>{
    connStat('Connected!', false, true);
    netSend({type:'join', id:G.localId, pos:{x:localP?.pos?.x||0,z:localP?.pos?.z||0}});
    if(!G.isMP){
      bots.forEach(b=>scene.remove(b.mesh)); bots=[];
      document.getElementById('csect').style.display='none'; menuShow(false); G.state='multiplayer'; G.isMP=true;
      initGame(); renderer.domElement.requestPointerLock();
    }
    // Remove bots for MP
    bots.forEach(b=>scene.remove(b.mesh)); bots=[];
  });
  conn.on('data', d=>netRecv(d));
  conn.on('close', ()=>connStat('Disconnected', true));
}

function netSend(d){if(G.conn&&G.conn.open)try{G.conn.send(d)}catch(e){}}

function netRecv(d){
  switch(d.type){
    case 'join':
      if(!G.netPlayers[d.id]){
        const rp=new Player(d.id,false);
        rp.label.element.textContent='ENEMY'; rp.label.element.style.color='#ff6b6b';
        if(d.pos)rp.pos.set(d.pos.x,1,d.pos.z);
        scene.add(rp.mesh); G.netPlayers[d.id]={p:rp};
        connStat('Player joined');
      }
      break;
    case 'pos':
      if(G.netPlayers[d.id]){
        const p=G.netPlayers[d.id].p;
        p.pos.set(d.x,1,d.z); p.yaw=d.y;
        if(p.mesh){p.mesh.position.copy(p.pos);p.mesh.position.y=0;p.mesh.rotation.y=p.yaw}
      }
      break;
    case 'hit':
      if(d.tid===G.localId&&localP){localP.dmg(d.dmg);document.getElementById('do').style.borderColor='rgba(255,0,0,0.35)';setTimeout(()=>{document.getElementById('do').style.borderColor='transparent'},100);updHUD();if(!localP.alive){addKF(d.aid||'ENEMY','YOU',d.w||'PISTOL');G.deaths++;updHUD()}}
      break;
    case 'shoot':
      if(G.netPlayers[d.id]){
        const p=G.netPlayers[d.id].p;
        if(p.mesh&&p.mesh.children[0]&&p.mesh.children[0].material){
          const o=p.mesh.children[0].material.color.getHex();
          p.mesh.children[0].material.color.setHex(0xffff00);
          setTimeout(()=>{if(p.mesh.children[0]&&p.mesh.children[0].material)p.mesh.children[0].material.color.setHex(o)},50);
        }
      }
      break;
  }
}

let _netTimer=0;
function netTick(dt){
  if(!G.isMP||!G.conn||!localP||!localP.alive)return;
  _netTimer+=dt;
  if(_netTimer>0.05){
    _netTimer=0;
    netSend({type:'pos',id:G.localId,x:localP.pos.x,z:localP.pos.z,y:localP.yaw});
  }
}

function connStat(msg, err, ok){
  const e=document.getElementById('cs');
  e.textContent=msg; e.style.display='block'; e.className='';
  if(err)e.classList.add('err'); if(ok)e.classList.add('ok');
  if(!err)setTimeout(()=>e.style.display='none',3500);
}

// ======================== GAME INIT ========================
function initGame(){
  // Reset
  bots.forEach(b=>scene.remove(b.mesh)); bots=[];
  Object.values(G.netPlayers).forEach(n=>{if(n.p&&n.p.mesh)scene.remove(n.p.mesh)});
  G.netPlayers={};
  if(localP&&localP.mesh)scene.remove(localP.mesh);
  localP = null;
  if(wpModel)cam.remove(wpModel);
  wpModel = null;

  G.kills = 0; G.deaths = 0;
  document.getElementById('kf').innerHTML = '';

  buildEnv();
  spawnLocal();
  makeWp();

  if(!G.isMP) spawnBots(CFG.botCount);

  updHUD();
  if(!G._loop){G._loop=true;loop()}
}

// ======================== GAME LOOP ========================
const CLK = new THREE.Clock();

function loop(){
  requestAnimationFrame(loop);
  const dt = Math.min(CLK.getDelta(), 0.05);

  if(G.state==='playing'||G.state==='multiplayer'){
    updPlayer(dt);
    bots.forEach(b=>b.tick(dt, localP));
    netTick(dt);
    updWp(dt);
    updHUD();
  }

  renderer.render(scene, cam);
  lr.render(scene, cam);
}

function updPlayer(dt){
  const p=localP; if(!p||!p.alive)return;

  cam.rotation.order='YXZ';
  cam.rotation.y=p.yaw; cam.rotation.x=p.pitch;

  const spd=K.shift?CFG.runSpeed:CFG.walkSpeed;
  const fwd=new THREE.Vector3(-Math.sin(p.yaw),0,-Math.cos(p.yaw));
  const rgt=new THREE.Vector3(fwd.z,0,-fwd.x);
  const md=new THREE.Vector3();
  if(K.w)md.add(fwd); if(K.s)md.sub(fwd); if(K.a)md.sub(rgt); if(K.d)md.add(rgt);
  if(md.length()>0){md.normalize();p.vel.x=md.x*spd;p.vel.z=md.z*spd}
  else{p.vel.x*=0.85;p.vel.z*=0.85}

  if(K.space&&p.onGround){p.vel.y=CFG.jumpForce;p.onGround=false}
  p.vel.y+=CFG.gravity*dt;
  p.pos.x+=p.vel.x*dt; p.pos.z+=p.vel.z*dt; p.pos.y+=p.vel.y*dt;
  if(p.pos.y<=1){p.pos.y=1;p.vel.y=0;p.onGround=true}

  const ms=CFG.mapSize-1;
  p.pos.x=Math.max(-ms,Math.min(ms,p.pos.x));
  p.pos.z=Math.max(-ms,Math.min(ms,p.pos.z));

  // Obstacle collision
  G._envObjects.forEach(o=>{
    if(!o.userData||!o.userData.isWall||!o.geometry)return;
    const b=new THREE.Box3().setFromObject(o), pp=p.pos, r=0.4;
    const hw=(b.max.x-b.min.x)/2+r, hd=(b.max.z-b.min.z)/2+r;
    const cx=(b.max.x+b.min.x)/2, cz=(b.max.z+b.min.z)/2;
    const dx=pp.x-cx, dz=pp.z-cz;
    if(Math.abs(dx)<hw&&Math.abs(dz)<hd){
      const ox=hw-Math.abs(dx), oz=hd-Math.abs(dz);
      if(ox<oz) pp.x+=dx>0?ox:-ox; else pp.z+=dz>0?oz:-oz;
    }
  });

  cam.position.copy(p.pos); cam.position.y+=1.5;
  p.mesh.position.copy(p.pos); p.mesh.position.y=0; p.mesh.rotation.y=p.yaw;
}

// ======================== START ========================
menuShow(true);
console.log('Standoff 2 Web Edition loaded!');
